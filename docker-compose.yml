services:
  # Flutter Web App
  # Cloudflare Tunnel: uno-vision.your-domain.com -> localhost:3010
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3010:80"
    restart: unless-stopped

  # Go API Backend
  # Cloudflare Tunnel: api.uno-vision.your-domain.com -> localhost:3011
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3011:8080"
    environment:
      - PORT=8080
      - DB_PATH=/app/data/sqlite.db
      - UPLOAD_PATH=/app/uploads
      - GIN_MODE=release
    volumes:
      - db_data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  db_data:
  uploads: