services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080" # Host:Container
    environment:
      - PORT=8080
      - DB_PATH=/app/data/sqlite.db
      - UPLOAD_PATH=/app/uploads
      - GIN_MODE=release
    volumes:
      - db_data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  db_data:
  uploads: